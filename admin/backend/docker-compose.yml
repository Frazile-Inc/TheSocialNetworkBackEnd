services:
  socialbackend:
    container_name: socialnetworkBE
    build: ./
    restart: always
    ports:
      - 5035:5035
    networks:
      - frazileserver
    depends_on:
      - socialDB

socialDB:
  container_name: socialnetworkDB
  image: mongo
  restart: always
  environment:
    MONGO_INITDB_ROOT_USERNAME: fzsocial
    MONGO_INITDB_ROOT_PASSWORD: "Y7!qP3mZ9@vL2Xr55Tn8Kc4WfH1sD6B0u"
  #      MONGO_INITDB_DATABASE: fzsocial
  volumes:
    - socialdatabase:/data/db
  ports:
    - 5036:27017
  networks:
    - frazileserver

volumes:
  socialdatabase:

networks:
  frazileserver:
    external: true
